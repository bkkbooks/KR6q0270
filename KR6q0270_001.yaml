body:
  text: 五家語録序威音王已前有無量恆河沙祖佛出世以十方世界為口出無量言辭談無量妙義而時人猶認三十二相迦陵仙音為佛真法身故萬不已俱入化火道場各遺舍利八斛四斗而輪王收取建造九級窣堵波至第九級結頂去不得處用千丈旃檀香木大數百圍從空錐下自塔之結角交加處透頂透底聳立格外上有重重寶盤上之更上復有鋭然金頂離頂入空湧出五色寶光每一一光各各現出非青非黃非赤白黑歷辨而明髏分不得之象令人數盡層級看透頂尖辨析五光心識路絶不知不覺目眩耳鳴轟然若雷之破頂自己全身化為舍利之光終日在太虗空中為祥為瑞或隱或顯普使見聞衆生同入五光三昧夫此一代時教五家宗旨之的派也何則崇高九級者五時之教義也令人心思可到受用可著者也結頂處者如來禪四句結縛三世諸佛口挂壁上大聰明人心如木石處也千丈旃檀從空破頂者祖師禪向格外轉身打翻窠臼直截痛快是也重重寶盤上有金頂者轉出轉高愈結愈鋭是也此從迦葉破顏以至六祖兩枝各各見此面目也離頂入空放五色光者五派分宗各建旨趣之謂也五色而非青黃赤白黑歷歷而明類分不得者五家各出宗旨之面目也令人看到教之級盡宗之頂尖心絶聞雷化為全身舍利之光在太虗空中為祥為瑞或隱或顯使見聞衆生同入五光三昧者入不思議境得大自在入魔入佛處也此五宗之所以為教宗之最上一大事因緣也今之為佛弟子者入教則不能出於九級而透結頂入宗則限於錐木而無重盤故聞五光者皆怒而罵笑而唾曰彼烏用此光而不色有以復無為怪為妖碎我身心者哉於是善出語者貴迅捷善作用者重孤硬致數五宗為旁出正旨為義學剖其梨削其語使臨濟雲門溈仰法眼曹洞之真兒孫頭破腦裂務令法無防制道可胡傳則兒孫遍天下五宗掃迹方為一大快事夫何更有靈山發願再來護持末法正宗者海昌之黎肩居士也參尋既久入法益深救法如救頭然護世如護眼目搜五家之語録梓以廣布於閻浮提世間使有目者皆見塔頂放光佛身常在入其目者皆得五光任運自如三昧此居士無功之功曷可以浮圖功德為較量者哉屬余序愧不能發五宗正趣聊於塔頂上加聚沙一掬勿使人更向五光中分無分有説是説非失取雙目吳門鄧蔚山天壽聖恩禪寺於密法藏和南撰五宗源流圖東土初祖達摩二祖慧可三祖僧璨四祖道信五祖弘忍六祖慧能大鑒下一世南嶽讓二世馬祖一三世百丈海四世黃檗運五世臨濟玄溈山佑仰山寂三世天王悟四世龍潭信五世德山鑒六世雪峰存七世雲門偃玄沙備八世羅漢琛九世清涼益大鑒下一世青原思二世石頭遷三世藥山儼四世雲巖晟五世洞山價六世曹山寂自達磨西來以傳二祖二祖傳三祖三祖傳四祖四祖傳五祖五祖傳六祖六祖遂出南嶽青原二宗南嶽出馬祖一一出百丈海海出黃檗運運得臨濟玄建立正宗故成臨濟宗丈次出溈山祐祐得仰山寂共相唱和成溈仰宗次青原出石頭遷遷出藥山儼儼出雲巖晟晟出洞山價價得曹山寂成曹洞宗馬祖次出天王悟悟出龍潭信信出德山鑒鑒出雪峰存存得雲門偃成雲門宗存次出玄沙備備出羅漢琛琛得清涼益成法眼宗然雲門法眼二宗景德傳燈謬收青原下據雪竇顯禪師塔銘敘為馬祖大寂九世孫逆遡以上雪竇嗣智門祚祚嗣香林遠遠嗣雪峰存雲門既嗣雪峰玄沙亦嗣雪峰則二宗俱屬馬大師無疑矣宋時于越雲壑瑞禪師集心燈録亦以二宗屬南嶽枝派世罕知者其書不甚流傳蓋時無開闢手眼踵謬襲訛莫相訂正茲閲五燈會元天王悟傳後詳載其説綜核源流辨析明確質諸金粟悟徑山信真寂印諸尊宿俱同是見爰著五宗源流圖改定傳後具擇法眼者當自證之五家語録序五家語者自達磨西來至六傳再四世法遍中華禪備衆體機語不一無心而分自成五家所謂偽仰臨濟曹洞雲門法眼然機用雖有五家無非直指之旨今黎眉居士刻茲語録復以前人辨證之言定為圖式可謂承上啓下先後包含閲是語者可盡五家差別之元以明自己差別之智總歸當人本地風光全機大用出於文字之表則雖見有五家兒孫空王佛田厙奴以至狐狼野干到來總與三十棒為甚如此者裏放過即不可崇禎壬申孟春於明天童方丈密雲圓悟題并書五家語録序世尊在雪山覩明星大悟歎曰奇哉衆生皆具如來智慧德相但因妄想執著而不證得十二部葛藤從這裏起若論直指人心尚未會在惟菩提達磨猶較些子飄然一鉢過我震旦教外別傳接上上根劈頭遇著不唧𠺕漢拂袖空山九年冷坐後得慧可以續慧命相授受至六祖大鑒衣鉢不傳單傳其法一花開五葉之讖其若是乎六祖下出二枝南嶽讓青原思南嶽下出溈仰臨濟雲門法眼青原下出曹洞溈仰父子金針玉線有九十七種圓相臨濟有四賓主四料揀四喝三玄三要一句中具三玄一玄中具三要有玄有要是吾宗旨即將建立法幢高竪宗風擾亂兜率陀天星飛斗散臨濟光明赫赤誰敢正視將示滅説傳法偈曰沿流不止問如何真照無邊説似他離相離名人不稟吹毛用了急須磨沿流不止一句以讖源流久長其餘溈仰雲門法眼三宗絶去久之雖有其宗無其人也曹洞一宗似乎影響之間半似半不是若氷月霜花西風掃地必矣宋時大慧杲禪師作略諸方柄殺活刀復起臨濟之風五逆聞雷不假言而自證近時時道邊淺乾剝剝以為禪曾不相聞有血盆口摩天俊之奇不用棒喝超越古人之見生殺之機毫無一語不是伊不濟只是伊不到闊綽無涯岸處既立邊淺涯岸之鄉命根原不曾斷那得如古人星光四野月色一天孤朗朗地無水不印左之右之無所不備嗟嗟今人有虗名之悟而無實證之功作用不如霄壤相隔宗門下衰啾啾亂啼命殞昏暗不出俗人之手習氣現前難逃生死之關要如古宿上堂告寂自在還家敢保驢年未夢見在海昌黎眉居士留心此道有年不辭辛苦參訪知識領得歸來受用自如具擇法眼備縱奪機遇其中人露一言半句如玉在石等間人安能容易得知乎搜尋五家尊宿語録彚刻成編以垂不朽俾見者聞者發宿命智知有向上一著離相離名無位真人在不行生死之紆徑高踏祖佛之頂𩕳正法眼藏正欲開示空王佛出頭來作麼生商量田厙奴聻崇禎庚午冬日徑山沙門語風圓信撰并書
